aid: steel-dynamics
name: Steel Dynamics
description: >-
  Steel Dynamics, Inc. is one of the largest domestic steel producers and
  metals recyclers in the United States, with operations spanning steel
  manufacturing, steel processing, and metals recycling. Founded in 1993 and
  headquartered in Fort Wayne, Indiana, the company operates steel mills,
  fabrication operations, and metals recycling facilities. Steel Dynamics is
  a Fortune 500 company listed on NASDAQ (STLD) and does not offer public
  developer APIs; data access is available through financial data providers
  and investor relations communications.
